services:
  db:
    image: postgres:16
    container_name: xtvilo_db
    restart: always
    environment:
      POSTGRES_DB: xtvilo_license
      POSTGRES_USER: xtvilo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks: [xtvilo_net]

  api:
    build: ./backend
    container_name: xtvilo_api
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg2://xtvilo:${POSTGRES_PASSWORD}@db:5432/xtvilo_license
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      GRACE_DAYS: ${GRACE_DAYS}
    depends_on: [db]
    networks: [xtvilo_net]

  nginx:
    image: nginx:stable
    container_name: xtvilo_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [api]
    networks: [xtvilo_net]

networks:
  xtvilo_net:
    driver: bridge
